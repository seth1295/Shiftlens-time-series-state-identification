# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
early_access: false

reviews:
  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  review_status: true
  review_details: true
  poem: false
  collapse_walkthrough: true
  changed_files_summary: true
  sequence_diagrams: false
  estimate_code_review_effort: true
  enable_prompt_for_ai_agents: true

  auto_review:
    enabled: true
    drafts: false
    auto_incremental_review: true

  pre_merge_checks:
    title:
      mode: "warning"
      requirements: >-
        Use a concise, professional title that accurately describes the change.
        Avoid hype language, unrelated project labels, external lineage claims,
        or implementation-detail titles.

    description:
      mode: "warning"

    issue_assessment:
      mode: "warning"

    custom_checks:
      - name: "Project Scope Boundary"
        mode: "error"
        instructions: >-
          Pass/fail criteria: Fail if user-facing files such as README.md,
          NOTICE, ATTRIBUTION.md, docs/*.md, examples/*.md, pyproject.toml, CLI
          help, or package docstrings describe ShiftLens as copied from, derived
          from, or tied to unrelated provenance outside this repository. Passing
          PRs use standalone OSS wording and describe only ShiftLens, its
          repository scope, its declared dependencies, and its documented
          attribution policy.

      - name: "Diagnostics Only Framing"
        mode: "error"
        instructions: >-
          Pass/fail criteria: Fail if docs, examples, CLI help, or exposed APIs
          frame ShiftLens as an automated decision, execution, operational,
          signal-authority, or production-control system. Passing PRs frame
          ShiftLens as diagnostics and reproducible state evidence only.

      - name: "Attribution Discipline"
        mode: "warning"
        instructions: >-
          Pass/fail criteria: Fail if the PR adds copied, adapted, or
          substantially derived third-party source material without preserving
          applicable license notices and documenting attribution in NOTICE or
          ATTRIBUTION.md. Passing PRs either contain original project code plus
          declared package dependencies, or clearly document third-party source
          provenance.

      - name: "Generated Artifacts"
        mode: "warning"
        instructions: >-
          Pass/fail criteria: Fail if the PR commits generated demo outputs, build
          artifacts, caches, virtual environments, test caches, or temporary reports
          unless the PR description explicitly says the generated artifact is
          intentional and explains why it belongs in source control.

  tools:
    github-checks:
      enabled: true
      timeout_ms: 90000
    ruff:
      enabled: true
    markdownlint:
      enabled: true
    yamllint:
      enabled: true
    gitleaks:
      enabled: true
    trufflehog:
      enabled: true
    trivy:
      enabled: true
